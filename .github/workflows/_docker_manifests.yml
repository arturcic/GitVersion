on:
  workflow_call:
    inputs:
      docker_distros:
        required: true
        type: string
      dotnet_versions:
        required: true
        type: string
      publish_manifests:
        required: true
        type: boolean

env:
  DOTNET_INSTALL_DIR: "./.dotnet"
  DOTNET_ROLL_FORWARD: "Major"

permissions:
  packages: write

jobs:
  manifest:
    name: ${{ matrix.docker_distro }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        docker_distro: ${{ fromJson(inputs.docker_distros) }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Independent setup steps run concurrently.
      - parallel:
          - name: Restore State
            uses: ./.github/actions/cache-restore

          - name: Set up Docker
            uses: ./.github/actions/docker-setup

      - name: Load DockerHub credentials
        if: inputs.publish_manifests
        id: dockerhub-creds
        uses: gittools/cicd/dockerhub-creds@824c3d773fb5d1b00c26b474ae88b7ce9ae555ee # v5
        with:
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      # Publish the multi-arch manifest for every .NET version concurrently.
      # NOTE: versions hardcoded because parallel: is static YAML (cannot iterate
      # inputs.dotnet_versions) — keep in sync with Constants.DotnetVersions.
      - parallel:
          - name: 'Docker Manifests (net10.0)'
            if: inputs.publish_manifests
            uses: ./.github/actions/docker-manifests
            with:
              docker_distro: ${{ matrix.docker_distro }}
              dotnet_version: '10.0'
              docker_registry_username: ${{ steps.dockerhub-creds.outputs.docker_username }}
              docker_registry_password: ${{ steps.dockerhub-creds.outputs.docker_password }}
              github_registry_username: ${{ github.repository_owner }}
              github_registry_password: ${{ github.token }}

          - name: 'Docker Manifests (net9.0)'
            if: inputs.publish_manifests
            uses: ./.github/actions/docker-manifests
            with:
              docker_distro: ${{ matrix.docker_distro }}
              dotnet_version: '9.0'
              docker_registry_username: ${{ steps.dockerhub-creds.outputs.docker_username }}
              docker_registry_password: ${{ steps.dockerhub-creds.outputs.docker_password }}
              github_registry_username: ${{ github.repository_owner }}
              github_registry_password: ${{ github.token }}

          - name: 'Docker Manifests (net8.0)'
            if: inputs.publish_manifests
            uses: ./.github/actions/docker-manifests
            with:
              docker_distro: ${{ matrix.docker_distro }}
              dotnet_version: '8.0'
              docker_registry_username: ${{ steps.dockerhub-creds.outputs.docker_username }}
              docker_registry_password: ${{ steps.dockerhub-creds.outputs.docker_password }}
              github_registry_username: ${{ github.repository_owner }}
              github_registry_password: ${{ github.token }}
