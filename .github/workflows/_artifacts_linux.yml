on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      arch:
        required: true
        type: string
      docker_distros:
        required: true
        type: string
      dotnet_versions:
        required: true
        type: string

env:
  DOTNET_INSTALL_DIR: "./.dotnet"
  DOTNET_ROLL_FORWARD: "Major"

jobs:
  artifacts:
    name: ${{ matrix.docker_distro }}
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        docker_distro: ${{ fromJson(inputs.docker_distros) }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Independent setup steps run concurrently before the artifact tests.
      - parallel:
          - name: Restore State
            uses: ./.github/actions/cache-restore

          - name: Download nuget packages
            uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
            with:
              name: nuget
              path: ${{ github.workspace }}/artifacts/packages/nuget

          - name: Download native packages
            uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
            with:
              name: native-Linux
              path: ${{ github.workspace }}/artifacts/packages/native

          - name: Set up Docker
            uses: ./.github/actions/docker-setup

      # Test the artifacts for every .NET version of this distro concurrently;
      # versions share the base-image layers (cached after the first).
      # NOTE: versions hardcoded because parallel: is static YAML (cannot iterate
      # inputs.dotnet_versions) — keep in sync with Constants.DotnetVersions.
      - parallel:
          - name: '[Test Artifacts] (net10.0)'
            shell: pwsh
            timeout-minutes: 30
            run: |
              dotnet run/artifacts.dll `
                    --target=ArtifactsTest --arch=${{ inputs.arch }} `
                    --dotnet_version=10.0 `
                    --docker_distro=${{ matrix.docker_distro }}

          - name: '[Test Artifacts] (net9.0)'
            shell: pwsh
            timeout-minutes: 30
            run: |
              dotnet run/artifacts.dll `
                    --target=ArtifactsTest --arch=${{ inputs.arch }} `
                    --dotnet_version=9.0 `
                    --docker_distro=${{ matrix.docker_distro }}

          - name: '[Test Artifacts] (net8.0)'
            shell: pwsh
            timeout-minutes: 30
            run: |
              dotnet run/artifacts.dll `
                    --target=ArtifactsTest --arch=${{ inputs.arch }} `
                    --dotnet_version=8.0 `
                    --docker_distro=${{ matrix.docker_distro }}
