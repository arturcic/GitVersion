on:
  workflow_call:

env:
  DOTNET_INSTALL_DIR: "./.dotnet"
  DOTNET_ROLL_FORWARD: "Major"

jobs:
  artifacts:
    name: Windows
    runs-on: windows-2025-vs2026
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - parallel:
          - name: Restore State
            uses: ./.github/actions/cache-restore

          - name: Download nuget packages
            uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
            with:
              name: nuget
              path: ${{ github.workspace }}/artifacts/packages/nuget

      # The Executable and MsBuild artifact tests are independent → run concurrently.
      - parallel:
          - name: '[Test Artifacts] (Executable)'
            shell: pwsh
            timeout-minutes: 30
            run: dotnet run/artifacts.dll --target=ArtifactsExecutableTest

          - name: '[Test Artifacts] (MsBuildFull)'
            shell: pwsh
            timeout-minutes: 30
            run: dotnet run/artifacts.dll --target=ArtifactsMsBuildFullTest
