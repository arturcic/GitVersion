on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      arch:
        required: true
        type: string
      docker_distros:
        required: true
        type: string
      dotnet_versions:
        required: true
        type: string
      publish_images:
        required: true
        type: boolean

env:
  DOTNET_INSTALL_DIR: "./.dotnet"
  DOTNET_ROLL_FORWARD: "Major"

permissions:
  packages: write

jobs:
  docker:
    name: ${{ matrix.docker_distro }}
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        docker_distro: ${{ fromJson(inputs.docker_distros) }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # These three setup steps are independent, so run them concurrently and
      # wait for all of them before building/testing the image.
      - parallel:
          - name: Restore State
            uses: ./.github/actions/cache-restore

          - name: Download nuget packages
            uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
            with:
              name: nuget
              path: ${{ github.workspace }}/artifacts/packages/nuget

          - name: Set up Docker
            uses: ./.github/actions/docker-setup

      # Build & test every .NET version for this distro concurrently. Versions of the
      # same distro share base-image layers, so later builds reuse the docker cache.
      # NOTE: versions are hardcoded because `parallel:` is static YAML and cannot
      # iterate inputs.dotnet_versions — keep this list in sync with Constants.DotnetVersions.
      - parallel:
          - name: 'Docker Test (net10.0)'
            if: inputs.publish_images == false
            uses: ./.github/actions/docker-test
            with:
              arch: ${{ inputs.arch }}
              docker_distro: ${{ matrix.docker_distro }}
              dotnet_version: '10.0'

          - name: 'Docker Test (net9.0)'
            if: inputs.publish_images == false
            uses: ./.github/actions/docker-test
            with:
              arch: ${{ inputs.arch }}
              docker_distro: ${{ matrix.docker_distro }}
              dotnet_version: '9.0'

          - name: 'Docker Test (net8.0)'
            if: inputs.publish_images == false
            uses: ./.github/actions/docker-test
            with:
              arch: ${{ inputs.arch }}
              docker_distro: ${{ matrix.docker_distro }}
              dotnet_version: '8.0'

      - name: Load DockerHub credentials
        id: dockerhub-creds
        if: inputs.publish_images
        uses: gittools/cicd/dockerhub-creds@824c3d773fb5d1b00c26b474ae88b7ce9ae555ee # v5
        with:
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - parallel:
          - name: 'Docker Publish (net10.0)'
            if: inputs.publish_images
            uses: ./.github/actions/docker-publish
            with:
              arch: ${{ inputs.arch }}
              docker_distro: ${{ matrix.docker_distro }}
              dotnet_version: '10.0'
              docker_registry_username: ${{ steps.dockerhub-creds.outputs.docker_username }}
              docker_registry_password: ${{ steps.dockerhub-creds.outputs.docker_password }}
              github_registry_username: ${{ github.repository_owner }}
              github_registry_password: ${{ github.token }}

          - name: 'Docker Publish (net9.0)'
            if: inputs.publish_images
            uses: ./.github/actions/docker-publish
            with:
              arch: ${{ inputs.arch }}
              docker_distro: ${{ matrix.docker_distro }}
              dotnet_version: '9.0'
              docker_registry_username: ${{ steps.dockerhub-creds.outputs.docker_username }}
              docker_registry_password: ${{ steps.dockerhub-creds.outputs.docker_password }}
              github_registry_username: ${{ github.repository_owner }}
              github_registry_password: ${{ github.token }}

          - name: 'Docker Publish (net8.0)'
            if: inputs.publish_images
            uses: ./.github/actions/docker-publish
            with:
              arch: ${{ inputs.arch }}
              docker_distro: ${{ matrix.docker_distro }}
              dotnet_version: '8.0'
              docker_registry_username: ${{ steps.dockerhub-creds.outputs.docker_username }}
              docker_registry_password: ${{ steps.dockerhub-creds.outputs.docker_password }}
              github_registry_username: ${{ github.repository_owner }}
              github_registry_password: ${{ github.token }}
